# render.yaml  — Deploy on Render as a Background Worker
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web                           # web service (listens on PORT)
    name: sp500-trading-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python trading_bot.py
    plan: free                          # Free tier keeps the process alive if pinged
    envVars:
      - key: ALPACA_API_KEY
        sync: false                     # set manually in Render dashboard (secret)
      - key: ALPACA_API_SECRET
        sync: false                     # set manually in Render dashboard (secret)
      - key: PYTHON_VERSION
        value: 3.11.0
